<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document Beautifier</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;700;800&family=Source+Sans+3:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="background"></div>
    <main class="layout">
      <header class="brand card">
        <div class="mark" aria-hidden="true"></div>
        <div>
          <p class="kicker">Whitepaper Workflow</p>
          <h1>Document Beautifier</h1>
          <p class="sub">DOCX laden, Logo setzen, Farben definieren, Vorlage wählen.</p>
        </div>
      </header>

      <section class="card">
        <h2>1. Dokument & Logo</h2>
        <div class="grid two">
          <label class="field upload">
            <span>Dokument hochladen (.docx)</span>
            <input id="docFile" type="file" accept=".docx" />
            <small id="docFileName">Keine Datei gewählt</small>
          </label>

          <label class="field upload">
            <span>Logo hochladen (PNG/JPG)</span>
            <input id="logoFile" type="file" accept=".png,.jpg,.jpeg" />
            <small id="logoFileName">Kein Logo gewählt</small>
          </label>

          <label class="field">
            <span>Input DOCX Pfad (für Terminal)</span>
            <input id="inputDocxPath" type="text" placeholder="/Users/.../input.docx" />
          </label>

          <label class="field">
            <span>Logo Pfad (optional)</span>
            <input id="logoPath" type="text" placeholder="/Users/.../logo.png" />
          </label>

          <label class="field">
            <span>Output DOCX Pfad</span>
            <input id="outputDocxPath" type="text" value="/Users/davidwegener/Desktop/Dokument-hübsch-Macher/output_styled.docx" />
          </label>

          <div class="logo-preview-wrap">
            <span>Logo Vorschau</span>
            <img id="logoPreview" alt="Logo Vorschau" />
          </div>
        </div>
      </section>

      <section class="card">
        <h2>2. Farben definieren</h2>
        <div class="grid three">
          <label class="field color-field">
            <span>Primärfarbe</span>
            <input id="primaryColor" type="color" value="#f50000" />
            <code id="primaryColorLabel">#f50000</code>
          </label>

          <label class="field color-field">
            <span>Textfarbe</span>
            <input id="textColor" type="color" value="#111111" />
            <code id="textColorLabel">#111111</code>
          </label>

          <label class="field">
            <span>Organisationsname (Fallback ohne Logo)</span>
            <input id="orgName" type="text" value="GRUENEWALD GmbH" />
          </label>
        </div>
      </section>

      <section class="card">
        <h2>3. Vorlage wählen</h2>
        <div class="template-grid" id="templateGrid">
          <label class="template active">
            <input type="radio" name="template" value="minimal" checked />
            <strong>Minimal</strong>
            <p>Viel Weißraum, dezente Akzente, nüchtern.</p>
          </label>
          <label class="template">
            <input type="radio" name="template" value="executive" />
            <strong>Executive</strong>
            <p>Balanced Business-Look für klassische Whitepaper.</p>
          </label>
          <label class="template">
            <input type="radio" name="template" value="bold" />
            <strong>Bold</strong>
            <p>Stärkere Überschriften und markanter Header.</p>
          </label>
        </div>
      </section>

      <section class="card output">
        <h2>4. Ausführen</h2>
        <p class="hint">Die Web-App erzeugt den Terminal-Befehl. Die Verarbeitung läuft lokal über `style_whitepaper.py`.</p>
        <pre id="commandBox"></pre>
        <div class="actions">
          <button id="copyBtn" type="button">Befehl kopieren</button>
        </div>
      </section>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
